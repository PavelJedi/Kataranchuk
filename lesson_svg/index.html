<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>svg</title>
	<link rel="stylesheet" href="src/css/main.css">
</head>
<body>
<main class="main">
	<div class="sprite">
		<div class="sprite__icon-holder"><span class="icon icon_linkedin"></span>
		</div>
		<div class="sprite__icon-holder"><span class="icon icon_youtube"></span>
		</div>
		<div class="sprite__icon-holder"><span class="icon icon_wiki"></span>
		</div>
	</div>
	<div class="svg">
			<div class="icon-holder">
				<svg class="icon1 icon-embed"><use xlink:href="#icon-embed"></use></svg><span class="icon1 icon_embed"></span>
			</div>
			<div class="icon-holder">
				<svg class="icon2 icon-instagram"><use xlink:href="#icon-instagram"></use></svg><span class="icon2 icon_ins"></span>
			</div>
			<div class="icon-holder">
				<svg class="icon3 icon-github"><use xlink:href="#icon-github"></use></svg><span class="icon3 icon_git"></span>
			</div>
			<div class="icon-holder">
				<svg class="icon4 icon-tumblr2"><use xlink:href="#icon-tumblr2"></use></svg><span class="icon1 icon_tumblr"></span>
			</div>
			<div class="icon-holder">
				<svg class="icon5 icon-appleinc"><use xlink:href="#icon-appleinc"></use></svg><span class="icon1 icon_apple"></span>
			</div>
			<div class="icon-holder">
				<svg class="icon6 icon-html-five"><use xlink:href="#icon-html-five"></use></svg><span class="icon1 icon_html"></span>
			</div>
	</div>
</main>

</body>
</html>
