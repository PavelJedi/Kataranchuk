<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>lesson8</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="head">
	<header>CSS Dinner Shopping List</header>
	<span class="head-span">Let’s go to the mall!</span>
</section>
<section class="list">
	<div class="container">
		<ul class="links">
			<li class="list-item1">
				<label for="check">
					<input type="checkbox" name="sign" id="check" class="checkbox-item">
					<span class="presudo-label">A lot of pickles</span>
					<span class="list-span">(for the next lessons about CSS)</span>
				</label>
			</li>
			<li class="list-item2">
				<label for="check1">
					<input type="checkbox" name="sign" id="check1" class="checkbox-item1">
					<span class="presudo-label1">10 apples</span>
					<span class="list-span">(for more CSS manipulations)</span>
				</label>
			</li>
			<li class="list-item3">
				<label for="check2">
					<input type="checkbox" name="sign" id="check2" class="checkbox-item2">
					<span class="presudo-label2">20 oranges</span>
					<span class="list-span">(because they are awesome)</span>
				</label>
			</li>
			<li class="list-item4">
				<label for="check3">
					<input type="checkbox" name="sign" id="check3" class="checkbox-item3">
					<span class="presudo-label3">13 plates</span>
					<span class="list-span">(hm... they always dissapear)</span>
				</label>
			</li>
			<li class="list-item5">
				<label for="check4">
					<input type="checkbox" name="sign" id="check4" class="checkbox-item4">
					<span class="presudo-label4">15 bentos</span>
				</label>
			</li>
			<li class="list-item6">
				<label for="check5">
					<input type="checkbox" name="sign" id="check5" class="checkbox-item5">
					<span class="presudo-label5">1 bottle of Sake</span>
					<span class="list-span">(for my friends)</span>
				</label>
			</li>
			<li class="list-item7">Bon appetit :)</li>
		</ul>
	</div>
</section>
</body>
</html>
